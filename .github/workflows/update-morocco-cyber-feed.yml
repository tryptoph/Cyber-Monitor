name: Update Morocco Cyber Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FEED_UPDATE_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build Morocco cyber feed
        run: python3 scripts/build_morocco_feed.py

      - name: Commit feed update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/morocco-cyber-feed.json
          if git diff --cached --quiet; then
            echo "No Morocco feed changes to commit."
            exit 0
          fi
          git commit -m "chore: update Morocco cyber feed"
          git push
